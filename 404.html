<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | Aura Health</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Manrope, sans-serif;
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 178, 191, .45), transparent 28rem),
        radial-gradient(circle at 80% 10%, rgba(129, 243, 229, .28), transparent 26rem),
        #fbf8ff;
      color: #000767;
    }
    .panel {
      background: rgba(255, 255, 255, .82);
      border: 1px solid #e3bdc3;
      box-shadow: 0 24px 80px rgba(0, 7, 103, .12);
      backdrop-filter: blur(14px);
    }
  </style>
</head>
<body>
  <main class="min-h-screen px-6 py-10 flex items-center justify-center">
    <section class="panel w-full max-w-3xl rounded-2xl p-8 md:p-12 text-center">
      <p class="text-sm font-extrabold uppercase tracking-[0.24em] text-[#b0004a]">404 error</p>
      <h1 class="mt-5 text-5xl md:text-7xl font-extrabold text-[#b0004a]">Page not found</h1>
      <p class="mx-auto mt-5 max-w-xl text-lg leading-8 text-[#5a4044]">
        This page is unavailable or has been moved. Please return to the Aura Health home page and try again.
      </p>
      <div class="mt-8 flex flex-col sm:flex-row justify-center gap-3">
        <a class="rounded-lg bg-[#b0004a] px-7 py-4 text-sm font-extrabold text-white shadow-lg transition hover:-translate-y-0.5 hover:shadow-xl" href="index.html">
          Back to Home
        </a>
        <a class="rounded-lg border border-[#e3bdc3] bg-white px-7 py-4 text-sm font-extrabold text-[#000767] transition hover:bg-[#fff2f3]" href="mailto:care@aurahealth.example">
          Contact Support
        </a>
      </div>
    </section>
  </main>
</body>
</html>
