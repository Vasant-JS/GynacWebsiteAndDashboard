<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Patient Registry</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"><style>body{font-family:Manrope,sans-serif;background:#fbf8ff;color:#000767}</style></head><body><main class="mx-auto max-w-5xl p-10"><nav class="mb-8 flex gap-4 font-bold"><a href="/doctor/dashboard.html">Dashboard</a><a class="text-[#b0004a]" href="/doctor/patients.html">Patient Registry</a><a href="/doctor/schedule.html">Schedule</a></nav><h1 class="text-5xl font-extrabold">Patient Registry</h1><input class="mt-8 w-full rounded-xl border border-[#e3bdc3] p-4" id="patient-search" placeholder="Search patient name or mobile"><section class="mt-6 grid gap-4" id="patient-results"></section></main><script>const input=document.getElementById('patient-search'),out=document.getElementById('patient-results');input.addEventListener('input',async()=>{if(input.value.trim().length<2){out.innerHTML='';return}const r=await fetch('/api/doctor/patients/search?q='+encodeURIComponent(input.value));const d=await r.json();out.innerHTML=(d.patients||[]).map(p=>`<article class="rounded-xl bg-white p-5 shadow-sm"><h2 class="text-2xl font-extrabold">${p.name}</h2><p class="text-[#5a4044]">${p.phone||''} ${p.email||''}</p><p class="font-bold text-[#006a62]">${p.concern}</p></article>`).join('')})</script></body></html>
