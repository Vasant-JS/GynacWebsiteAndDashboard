<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Doctor Schedule</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"><style>body{font-family:Manrope,sans-serif;background:#fbf8ff;color:#000767}.side{position:fixed;inset:0 auto 0 0;width:260px;background:#edecff}</style></head>
<body><aside class="side p-6"><h1 class="text-3xl font-extrabold text-[#b0004a]">Aura Health</h1><nav class="mt-10 grid gap-2 font-bold"><a href="/doctor/dashboard.html" class="rounded-lg px-4 py-3 hover:bg-white">Clinic Overview</a><a href="/doctor/schedule.html" class="rounded-lg bg-white px-4 py-3 text-[#b0004a]">Daily Schedule</a><a href="/doctor/patients.html" class="rounded-lg px-4 py-3 hover:bg-white">Patient Registry</a><a href="/doctor/slots.html" class="rounded-lg px-4 py-3 hover:bg-white">Slot Management</a></nav></aside>
<main class="ml-[260px] p-10"><h1 class="text-5xl font-extrabold">Daily Schedule</h1><p class="mt-2 font-bold text-[#006a62]" id="schedule-status">Loading...</p>
<form class="mt-8 rounded-xl bg-white p-5 shadow-sm" id="availability-form"><h2 class="text-2xl font-extrabold">Availability and Slots</h2><div class="mt-4 grid gap-3 md:grid-cols-4"><input id="availability-date" class="rounded-lg border-[#e3bdc3]" type="date"><label class="rounded-lg border border-[#e3bdc3] p-3 font-bold"><input checked id="availability-available" type="checkbox"> Available</label></div><div class="mt-4 flex flex-wrap gap-3">${['09:00 AM','09:30 AM','10:30 AM','01:00 PM','02:30 PM','04:00 PM','06:30 PM','07:00 PM','07:30 PM'].map(s=>`<label class="rounded-lg border border-[#e3bdc3] px-3 py-2 font-bold"><input checked data-slot-option value="${s}" type="checkbox"> ${s}</label>`).join('')}</div><button class="mt-4 rounded-lg bg-[#b0004a] px-5 py-3 font-bold text-white">Save Availability</button><p class="mt-3 font-bold text-[#006a62]" id="availability-message"></p></form>
<section class="mt-8"><h2 class="text-3xl font-extrabold">Daily Schedule</h2><div class="mt-5 grid gap-4" id="daily-schedule"></div></section><section class="mt-10"><h2 class="text-3xl font-extrabold">Monthly Schedule</h2><div class="mt-5 grid gap-4" id="monthly-schedule"></div></section></main><script src="/assets/js/doctor-schedule.js"></script></body></html>
