<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Appointments | Aura Health</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>body{font-family:Manrope,sans-serif;background:#fbf8ff;color:#000767}.side{position:fixed;inset:0 auto 0 0;width:260px;background:#edecff}</style>
</head>
<body data-patient-page="appointments">
  <aside class="side p-6"><h1 class="text-3xl font-extrabold text-[#b0004a]">Patient Portal</h1><nav class="mt-8 grid gap-2 font-bold"><a class="rounded-lg px-4 py-3 hover:bg-white" href="/patient/dashboard.html">Dashboard</a><a class="rounded-lg bg-white px-4 py-3 text-[#b0004a]" href="/patient/appointments.html">Appointments</a><a class="rounded-lg px-4 py-3 hover:bg-white" href="/patient/reports.html">Medical Reports</a><a class="rounded-lg px-4 py-3 hover:bg-white" href="/patient/profile.html">Profile</a></nav></aside>
  <main class="ml-[260px] p-10">
    <h1 class="text-5xl font-extrabold">Appointments</h1><p class="mt-2 font-bold text-[#006a62]" id="patient-page-status">Loading from PostgreSQL...</p>
    <div class="mt-8 flex gap-4 border-b border-[#e3bdc3] font-bold"><button class="border-b-2 border-[#b0004a] px-2 py-3 text-[#b0004a]" data-appointment-tab="upcoming" type="button">Future / Upcoming</button><button class="px-2 py-3 text-[#5a4044]" data-appointment-tab="past" type="button">Past Bookings</button></div>
    <section class="mt-8 grid gap-4" id="patient-page-content"></section>
  </main>
  <div class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 px-4" id="appointment-action-modal"><div class="w-full max-w-lg rounded-xl bg-white p-6 shadow-2xl"><div class="mb-5 flex justify-between"><div><h2 class="text-2xl font-extrabold" id="appointment-modal-title">Action</h2><p class="text-[#5a4044]" id="appointment-modal-subtitle"></p></div><button id="appointment-modal-close" type="button">x</button></div><form class="grid gap-4" id="appointment-modal-form"></form><p class="mt-3 text-sm font-bold text-[#006a62]" id="appointment-action-message"></p></div></div>
  <script src="/assets/js/patient-simple-page.js"></script>
</body>
</html>
