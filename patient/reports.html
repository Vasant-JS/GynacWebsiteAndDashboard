<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Medical Reports | Aura Health</title><script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"><style>body{font-family:Manrope,sans-serif;background:#fbf8ff;color:#000767}.side{position:fixed;inset:0 auto 0 0;width:260px;background:#edecff}</style></head>
<body data-patient-page="reports">
  <aside class="side p-6"><h1 class="text-3xl font-extrabold text-[#b0004a]">Patient Portal</h1><nav class="mt-8 grid gap-2 font-bold"><a class="rounded-lg px-4 py-3 hover:bg-white" href="/patient/dashboard.html">Dashboard</a><a class="rounded-lg px-4 py-3 hover:bg-white" href="/patient/appointments.html">Appointments</a><a class="rounded-lg bg-white px-4 py-3 text-[#b0004a]" href="/patient/reports.html">Medical Reports</a><a class="rounded-lg px-4 py-3 hover:bg-white" href="/patient/profile.html">Profile</a></nav></aside>
  <main class="ml-[260px] p-10"><h1 class="text-5xl font-extrabold">Medical Reports</h1><p class="mt-2 font-bold text-[#006a62]" id="patient-page-status">Loading from PostgreSQL...</p>
    <form class="mt-8 grid gap-3 rounded-xl bg-white p-5 shadow-sm md:grid-cols-5" id="document-upload-form" enctype="multipart/form-data"><select class="rounded-lg border-[#e3bdc3]" name="documentType"><option value="REPORT">Uploaded Report</option><option value="OLD_PRESCRIPTION">Old Prescription</option></select><input class="rounded-lg border-[#e3bdc3]" name="name" placeholder="Name" required><input class="rounded-lg border-[#e3bdc3]" name="documentDate" type="date"><input class="rounded-lg border-[#e3bdc3]" name="file" type="file"><button class="rounded-lg bg-[#b0004a] px-4 py-3 font-bold text-white">Upload</button></form><p class="mt-3 text-sm font-bold text-[#006a62]" id="document-upload-message"></p>
    <div class="mt-8 flex gap-4 border-b border-[#e3bdc3] font-bold"><button class="border-b-2 border-[#b0004a] px-2 py-3 text-[#b0004a]" data-document-tab="reports" type="button">Uploaded Reports</button><button class="px-2 py-3 text-[#5a4044]" data-document-tab="prescriptions" type="button">New Prescription</button></div>
    <section class="mt-8 grid gap-4" id="patient-page-content"></section>
  </main><script src="/assets/js/patient-simple-page.js"></script>
</body></html>
